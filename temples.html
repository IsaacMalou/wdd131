<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Album</title>
    <meta name="author" content="Isaac Malou">
    <meta name="description"
        content="A responsive temple gallery page featuring a dynamic hamburger menu and grid layout.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Open+Sans&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css" media="(min-width: 768px)">

    <script src="scripts/temples.js" defer></script>
</head>

<body>
    <header>
        <h1>Temple Album</h1>
        <button id="menu" aria-label="Toggle Menu"></button>
        <nav>
            <a href="#" class="active">Home</a>
            <a href="#">Old</a>
            <a href="#">New</a>
            <a href="#">Large</a>
            <a href="#">Small</a>
        </nav>
    </header>

    <main>
        <h2>Featured Temples</h2>
        <div class="grid-container">
            <figure>
                <img src="images/nairobi-temple.webp" alt="Nairobi Kenya Temple" loading="lazy" width="400"
                    height="250">
                <figcaption>Nairobi Kenya Temple</figcaption>
            </figure>
            <figure>
                <img src="images/japan_temple.webp" alt="Japan Temple" loading="lazy" width="400" height="250">
                <figcaption>Japan Temple</figcaption>
            </figure>
            <figure>
                <img src="images/nicaragua_temple.webp" alt="Nicaragua Temple" loading="lazy" width="400" height="250">
                <figcaption>Nicaragua Temple</figcaption>
            </figure>
            <figure>
                <img src="images/paris-temple.webp" alt="St. Paris Temple" loading="lazy" width="400" height="250">
                <figcaption>St. Paris Temple</figcaption>
            </figure>
            <figure>
                <img src="images/nairobi-temple.webp" alt="Nairobi Kenya Temple (Duplicate)" loading="lazy" width="400"
                    height="250">
                <figcaption>Nairobi Kenya Temple</figcaption>
            </figure>
            <figure>
                <img src="images/ephraim-temple.webp.webp" alt="Ephraim Utah Temple" loading="lazy" width="400"
                    height="250">
                <figcaption>Ephraim Utah Temple</figcaption>
            </figure>
            <figure>
                <img src="images/capetown-temple.webp.webp" alt="Cape Town Africa Temple" loading="lazy" width="400"
                    height="250">
                <figcaption>Cape Town Africa Temple</figcaption>
            </figure>
            <figure>
                <img src="images/apia_samoa_temple_lds.webp" alt="Apia Samoa Temple" loading="lazy" width="400"
                    height="250">
                <figcaption>Apia Samoa Temple</figcaption>
            </figure>
            <figure>
                <img src="images/billings-montana-temple.jpg" alt="Billings Montana Temple" loading="lazy" width="400"
                    height="250">
                <figcaption>Billings Montana Temple</figcaption>
            </figure>
        </div>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> | Isaac Malou | WDD 131 Course</p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
