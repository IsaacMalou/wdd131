<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <meta name="description" content="Product review form allowing users to rate and review our products.">
    <meta name="author" content="Isaac Malou">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html" class="review-form">
            <fieldset class="main-fieldset">
                <legend class="sr-only">Review Details</legend>

                <label for="productName">Product Name</label>
                <select id="productName" name="productName" required>
                    <option value="" disabled selected>Choose a Product ...</option>
                </select>

                <fieldset class="rating-group">
                    <legend>Overall Rating</legend>
                    <div class="stars">
                        <div class="star-col">
                            <label for="star1">&#9734;</label>
                            <input type="radio" id="star1" name="rating" value="1" required>
                        </div>
                        <div class="star-col">
                            <label for="star2">&#9734;&#9734;</label>
                            <input type="radio" id="star2" name="rating" value="2" required>
                        </div>
                        <div class="star-col">
                            <label for="star3">&#9734;&#9734;&#9734;</label>
                            <input type="radio" id="star3" name="rating" value="3" required>
                        </div>
                        <div class="star-col">
                            <label for="star4">&#9734;&#9734;&#9734;&#9734;</label>
                            <input type="radio" id="star4" name="rating" value="4" required>
                        </div>
                        <div class="star-col">
                            <label for="star5">&#9734;&#9734;&#9734;&#9734;&#9734;</label>
                            <input type="radio" id="star5" name="rating" value="5" required>
                        </div>
                    </div>
                </fieldset>

                <label for="installDate">Date of Installation</label>
                <input type="date" id="installDate" name="installDate" required>

                <fieldset class="features-group">
                    <legend>Which features did you find useful in the product? <br><em>(Check all that apply)</em>
                    </legend>

                    <div class="checkbox-item">
                        <input type="checkbox" id="feature1" name="feature" value="durability">
                        <label for="feature1">Durability</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="feature2" name="feature" value="ease">
                        <label for="feature2">Ease of Use</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="feature3" name="feature" value="performance">
                        <label for="feature3">Performance</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="feature4" name="feature" value="design">
                        <label for="feature4">Design</label>
                    </div>
                </fieldset>

                <label for="writtenReview">Written Review <span class="optional">(Optional)</span></label>
                <textarea id="writtenReview" name="writtenReview" rows="5"></textarea>

                <label for="userName">Your Name <span class="optional">(Optional)</span></label>
                <input type="text" id="userName" name="userName">
            </fieldset>

            <input type="submit" value="Post Review" class="submit-btn">
        </form>
    </main>

    <footer>
        <p>&copy;<span id="currentyear"></span> 🛖 Isaac Malou 🛖 <br> South Sudan</p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
