<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <meta name="description" content="Product review form allowing users to rate and review our products.">
    <meta name="author" content="Isaac Malou">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html" class="review-form">
            <fieldset>
                <legend>Review Details</legend>

                <label for="productName">Product Name *</label>
                <select id="productName" name="productName" required>
                    <option value="" disabled selected>Select a Product ...</option>
                </select>

                <fieldset class="rating-group">
                    <legend>Overall Rating *</legend>
                    <div class="stars">
                        <label><input type="radio" id="star1" name="rating" value="1" required> &#9734; 1</label>
                        <label><input type="radio" id="star2" name="rating" value="2"> &#9734; 2</label>
                        <label><input type="radio" id="star3" name="rating" value="3"> &#9734; 3</label>
                        <label><input type="radio" id="star4" name="rating" value="4"> &#9734; 4</label>
                        <label><input type="radio" id="star5" name="rating" value="5"> &#9734; 5</label>
                    </div>
                </fieldset>

                <label for="installDate">Date of Installation *</label>
                <input type="date" id="installDate" name="installDate" required>

                <fieldset class="features-group">
                    <legend>Which features did you find useful in the product? <br><em>(Check all that apply)</em>
                    </legend>
                    <label><input type="checkbox" name="feature" value="durability"> Durability</label>
                    <label><input type="checkbox" name="feature" value="ease"> Ease of Use</label>
                    <label><input type="checkbox" name="feature" value="performance"> Performance</label>
                    <label><input type="checkbox" name="feature" value="design"> Design</label>
                </fieldset>

                <label for="writtenReview">Written Review (Optional)</label>
                <textarea id="writtenReview" name="writtenReview" rows="5"></textarea>

                <label for="userName">Your Name (Optional)</label>
                <input type="text" id="userName" name="userName">
            </fieldset>

            <input type="submit" value="Post Review" class="submit-btn">
        </form>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> | Isaac Malou | South Sudan</p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
